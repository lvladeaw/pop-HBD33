<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Romantic birthday story for Pop.">
  <title>Our Story</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%99%A1%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="scene-drawer" id="sceneDrawer" aria-hidden="true">
      <div class="scene-drawer__card">
        <div class="scene-drawer__header">
          <p>Our Story</p>
          <button class="icon-button" id="closeDrawerButton" type="button" aria-label="Close menu">×</button>
        </div>
        <div class="scene-drawer__tabs">
          <button class="drawer-tab" data-target-scene="1" type="button">1. Birthday</button>
          <button class="drawer-tab" data-target-scene="2" type="button">2. เดทแรกและทริปแรก</button>
          <button class="drawer-tab" data-target-scene="3" type="button">3. วาเลนไทน์ 2569</button>
          <button class="drawer-tab" data-target-scene="4" type="button">4. ทริปเขาคิชฌกูฎ</button>
          <button class="drawer-tab" data-target-scene="5" type="button">5. ใช้เวลาด้วยกัน</button>
          <button class="drawer-tab" data-target-scene="6" type="button">6. ดูหนังเวลาของครอบครัว</button>
          <button class="drawer-tab" data-target-scene="7" type="button">7. Gallery</button>
        </div>
      </div>
    </aside>

    <header class="topbar">
      <div class="topbar__left">
        <button class="icon-button" id="openDrawerButton" type="button" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="brand-lockup">
          <span class="brand-title">Our Story ♡</span>
        </div>
      </div>

      <div class="topbar__right">
        <button class="glass-button" id="musicToggle" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="glass-button__icon">♪</span>
          <span id="musicToggleLabel">Sound</span>
        </button>
        <button class="glass-button" data-target-scene="7" type="button">
          <span class="glass-button__icon">▣</span>
          <span>Gallery</span>
        </button>
      </div>
    </header>

    <section class="music-panel" id="musicPanel" aria-hidden="true">
      <div class="music-panel__card">
        <div class="music-panel__top">
          <p class="music-panel__title">Soundtrack</p>
          <button class="music-panel__close" id="musicPanelClose" type="button" aria-label="Close soundtrack panel">×</button>
        </div>
        <label class="music-panel__field">
          <span>Choose song</span>
          <select id="trackSelect">
            <option value="0">Happy Birthday</option>
            <option value="1">Best Gift</option>
          </select>
        </label>
        <label class="music-panel__field">
          <span>Volume</span>
          <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.18">
        </label>
        <div class="music-panel__actions">
          <button class="music-action-button" id="playPauseButton" type="button">Pause</button>
          <button class="music-action-button music-action-button--ghost" id="nextTrackButton" type="button">Next Song</button>
        </div>
      </div>
    </section>

    <main class="story-app" id="storyApp">
      <section class="scene scene--active scene--hero" id="scene-1" data-scene="1" data-title="Birthday">
        <div class="scene__bg scene__bg--single"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--fullbg" id="scene-2" data-scene="2" data-title="เดทแรกและทริปแรก">
        <div class="scene__bg scene__bg--scene2"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--fullbg" id="scene-3" data-scene="3" data-title="วาเลนไทน์ 2569">
        <div class="scene__bg scene__bg--scene3"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--fullbg" id="scene-4" data-scene="4" data-title="ทริปเขาคิชฌกูฎ">
        <div class="scene__bg scene__bg--scene4"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--fullbg" id="scene-5" data-scene="5" data-title="ใช้เวลาด้วยกัน">
        <div class="scene__bg scene__bg--scene5"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--fullbg" id="scene-6" data-scene="6" data-title="ดูหนังเวลาของครอบครัว">
        <div class="scene__bg scene__bg--scene6"></div>
        <div class="scene__hero-overlay"></div>
      </section>

      <section class="scene scene--gallery" id="scene-7" data-scene="7" data-title="Gallery">
        <div class="scene__backdrop scene__backdrop--gallery"></div>
        <div class="scene__content">
          <div class="scene-card scene-card--gallery">
            <h2>Gallery ของเรา</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-button nav-button--circle" id="prevButton" type="button" aria-label="Previous scene">‹</button>
      <div class="scene-status">
        <p class="scene-status__counter"><span id="currentSceneNumber">1</span> / 7</p>
      </div>
      <button class="nav-button nav-button--circle" id="nextButton" type="button" aria-label="Next scene">›</button>
    </nav>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__backdrop" id="lightboxBackdrop" type="button" aria-label="Close image preview"></button>
    <div class="lightbox__dialog" role="dialog" aria-modal="true" aria-label="Gallery image preview">
      <button class="lightbox__close" id="lightboxClose" type="button" aria-label="Close image preview">×</button>
      <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" type="button" aria-label="Previous image">‹</button>
      <img id="lightboxImage" src="" alt="Gallery image preview">
      <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" type="button" aria-label="Next image">›</button>
    </div>
  </div>

  <audio id="storyAudio" preload="auto"></audio>

  <script src="js/gallery-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
